[build]
  command   = "npm ci && node build.js"
  publish   = "."

[build.processing.html]
  pretty_urls = true

# Branch deploys (e.g. draft branch)
[context.branch-deploy]
  command = "npm ci && node build.js"
  publish = "."

# Explicit draft branch config
[context.draft]
  command = "npm ci && node build.js"
  publish = "."
