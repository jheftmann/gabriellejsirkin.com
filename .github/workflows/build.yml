name: Build

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'src/**'
      - 'build.js'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: node build.js
        # Netlify handles the actual deploy — this step is validation only.
        # No commit back to main; that was causing push conflicts on every push.
