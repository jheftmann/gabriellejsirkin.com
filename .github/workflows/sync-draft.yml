name: Sync code to draft

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - 'src/**'
      - 'assets/**'
      - 'scripts/**'
      - 'build.js'
      - 'package.json'
      - 'package-lock.json'
      - 'netlify.toml'
      - 'favicon.svg'
      - 'favicon-32x32.png'
      - 'README.md'
      - 'CLAUDE.md'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync code files to draft
        run: |
          git checkout draft
          git pull origin draft

          # Managed paths — all of these mirror from main → draft, including deletions.
          # NB: assets/ is now whole-directory so fonts and images sync too.
          PATHS=(admin src assets scripts .github build.js \
                 package.json package-lock.json netlify.toml \
                 favicon.svg favicon-32x32.png README.md CLAUDE.md)

          # 1) Pull main's current state for those paths (handles add/modify)
          for p in "${PATHS[@]}"; do
            git checkout origin/main -- "$p" 2>/dev/null || true
          done

          # 2) Delete files that exist on draft in managed paths but not on main
          #    (handles deletes — previous workflow couldn't propagate these)
          {
            git ls-tree -r --name-only HEAD -- "${PATHS[@]}" 2>/dev/null | sort
          } > /tmp/draft-files
          {
            git ls-tree -r --name-only origin/main -- "${PATHS[@]}" 2>/dev/null | sort
          } > /tmp/main-files
          comm -23 /tmp/draft-files /tmp/main-files | while IFS= read -r f; do
            [ -n "$f" ] && git rm -f -- "$f" 2>/dev/null || true
          done

          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to sync."
          else
            git commit -m "sync: update code/config from main"
            git push origin draft
          fi
