name: Sync code to draft

on:
  push:
    branches: [main]
    paths:
      - 'admin/**'
      - 'src/**'
      - 'assets/**'
      - 'scripts/**'
      - 'build.js'
      - 'package.json'
      - 'package-lock.json'
      - 'netlify.toml'
      - 'favicon.svg'
      - 'README.md'
      - 'CLAUDE.md'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync code files to draft
        run: |
          git checkout draft
          git pull origin draft
          git checkout origin/main -- \
            admin/ src/ assets/css/ assets/js/ build.js \
            package.json package-lock.json scripts/ .github/ \
            netlify.toml favicon.svg README.md CLAUDE.md \
            2>/dev/null || true
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to sync."
          else
            git commit -m "sync: update code/config from main"
            git push origin draft
          fi
