name: Build (draft)

on:
  push:
    branches: [draft]
    paths:
      - 'content/**'
      - 'src/**'
      - 'build.js'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: node build.js
        # Draft branch: build only for validation, do NOT commit output back.
        # Built HTML is only committed on main (which deploys to GitHub Pages).
