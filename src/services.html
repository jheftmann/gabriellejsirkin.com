<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- #meta -->
<!-- #include _head.html -->
<link rel="stylesheet" href="assets/css/about.css">
</head>
<body>
<!-- #include _nav.html -->

<main id="main-content" class="page-content">
<div class="about-page">
  <div class="about-layout">

    <h1 class="about-headline">{{SETTING:headline_1}}<br><i>{{SETTING:headline_2}}</i></h1>

    <div class="about-main">
      <div class="about-row">
        <h2 class="row-label">Approach</h2>
        <div class="row-content">
<!-- #travel-approach -->
        </div>
      </div>

      <div class="about-row">
        <h2 class="row-label">Services</h2>
        <div class="row-content">
          <ul class="travel-grid">
<!-- #travel-services -->
          </ul>
        </div>
      </div>

      <div class="about-row">
        <h2 class="row-label">Clients</h2>
        <div class="row-content">
          <ul class="travel-grid">
<!-- #travel-clients -->
          </ul>
        </div>
      </div>

      <div class="about-row">
        <h2 class="row-label">{{SETTING:city_guides_label}}</h2>
        <div class="row-content">
          <p class="bio-para">{{SETTING:city_guides_intro}}</p>
          <ul class="travel-grid">
<!-- #travel-cities -->
          </ul>
        </div>
      </div>

    </div>

    <aside class="about-sidebar">
      <p class="sidebar-label">{{SETTING:sidebar_label}}</p>
      <div class="sidebar-text">
        <p class="sidebar-bio sidebar-avail">{{SETTING:availability}}</p>
        <a href="mailto:{{SETTING:contact_email}}" class="sidebar-email contact-link">{{SETTING:contact_email}}</a>
      </div>
      <img src="{{SETTING:sidebar_photo}}" alt="" class="sidebar-photo">
<!-- #include _sidebar-links.html -->
    </aside>

  </div>
</div>

</main><!-- /.page-content -->
<!-- #include _footer.html -->

<script src="assets/js/site.js"></script>
</body>
</html>
