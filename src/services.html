<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- #meta -->
<!-- #include _head.html -->
<link rel="stylesheet" href="assets/css/about.css">
<link rel="stylesheet" href="assets/css/travel.css">
</head>
<body data-scheme="services">
<!-- #include _nav.html -->

<div class="page-content">
<div class="about-page">
  <div class="about-layout">

    <h1 class="about-headline">{{SETTING:headline_1}}<br><em>{{SETTING:headline_2}}</em></h1>

    <div class="about-main">
      <div class="about-row">
        <h2 class="row-label">Approach</h2>
        <div class="row-content">
<!-- #travel-approach -->
        </div>
      </div>

      <div class="about-row">
        <h2 class="row-label">Services</h2>
        <div class="row-content">
          <div class="travel-grid">
<!-- #travel-services -->
          </div>
        </div>
      </div>

      <div class="about-row">
        <h2 class="row-label">Clients</h2>
        <div class="row-content">
          <div class="travel-grid">
<!-- #travel-clients -->
          </div>
        </div>
      </div>

      <div class="about-row">
        <h2 class="row-label">City Guides</h2>
        <div class="row-content">
          <p class="bio-para">{{SETTING:city_guides_intro}}</p>
          <div class="travel-grid">
<!-- #travel-cities -->
          </div>
        </div>
      </div>

    </div>

    <aside class="about-sidebar">
      <p class="sidebar-label">{{SETTING:sidebar_label}}</p>
      <p class="sidebar-bio sidebar-avail">{{SETTING:availability}}</p>
      <a href="mailto:{{SETTING:contact_email}}" class="sidebar-email contact-link">{{SETTING:contact_email}}</a>
      <img src="{{SETTING:sidebar_photo}}" alt="" class="sidebar-photo">
      <div class="sidebar-links">
        <a href="{{SETTING:contact_instagram}}" target="_blank" class="contact-link">Instagram</a>
        <a href="{{SETTING:contact_linkedin}}" target="_blank" class="contact-link">LinkedIn</a>
        <a href="mailto:{{SETTING:contact_email}}" class="contact-link">Email</a>
      </div>
    </aside>

  </div>
</div>

</div><!-- /.page-content -->
<!-- #include _footer.html -->

<script src="assets/js/site.js"></script>
</body>
</html>
