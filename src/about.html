<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About — {{SETTING:site_title}}</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="description" content="{{SETTING:site_description}}">
<meta property="og:title" content="About — {{SETTING:site_title}}">
<meta property="og:description" content="{{SETTING:site_description}}">
<meta property="og:image" content="{{SETTING:sharecard_url}}">
<meta property="og:url" content="{{SETTING:site_url}}/about.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="About — {{SETTING:site_title}}">
<meta name="twitter:description" content="{{SETTING:site_description}}">
<meta name="twitter:image" content="{{SETTING:sharecard_url}}">
<!-- #include _head.html -->
<link rel="stylesheet" href="assets/css/about.css">
</head>
<body data-scheme="about">
<div class="cursor" id="cursor"></div>

<!-- #include _nav.html -->

<div class="about-page">
  <div class="about-layout">

    <div class="about-main">
      <h1 class="about-headline">{{SETTING:headline_1}}<br><em>{{SETTING:headline_2}}</em></h1>

      <div class="about-row">
        <p class="row-label">Areas of Expertise</p>
        <div class="row-content">
<!-- #about-skills -->
        </div>
      </div>

      <div class="about-row">
        <p class="row-label">About</p>
        <div class="row-content">
<!-- #about-bio -->
        </div>
      </div>

    </div>

    <aside class="about-sidebar">
      <p class="sidebar-bio">{{SETTING:lead}}</p>
      <img src="{{SETTING:sidebar_photo}}" alt="" class="sidebar-photo">
      <div class="sidebar-links">
        <a href="{{SETTING:contact_instagram}}" target="_blank" class="contact-link">Instagram</a>
        <a href="{{SETTING:contact_linkedin}}" target="_blank" class="contact-link">LinkedIn</a>
        <a href="mailto:{{SETTING:contact_email}}" class="contact-link">Email</a>
      </div>
    </aside>

  </div>
</div>

<!-- #include _footer.html -->

<script src="assets/js/site.js"></script>
</body>
</html>
