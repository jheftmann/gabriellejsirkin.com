<style>
:root {
  --warm-white: #FAF8F5;
  --cream: #F0EDE8;
  --charcoal: #1A1A18;
  --mid-gray: #8A8680;
  --light-gray: #D4D0CA;
  --accent: #C8A882;
  --accent-dark: #9E7D5A;
  --skill-bg: #EDEAE4;
  --side: 160px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--warm-white); color: var(--charcoal); font-family: 'DM Sans', sans-serif; font-weight: 400; font-size: 17px; overflow-x: hidden; }

/* NAV */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px var(--side);
  background: var(--warm-white);
}
.nav-brand { text-decoration: none; }
.nav-name { font-size: 16px; font-weight: 400; letter-spacing: 0;  color: var(--charcoal); display: block; }

.nav-links { display: flex; gap: 36px; list-style: none; }
.nav-links a { font-size: 14px; font-weight: 400; color: var(--mid-gray); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover { color: var(--charcoal); }

/* BACK LINK */
.back-wrap { padding: 108px var(--side) 0; max-width: 1440px; margin: 0 auto; }
.back {
  font-size: 13px; font-weight: 400;
  color: var(--mid-gray); text-decoration: none; transition: color 0.2s;
}
.back:hover { color: var(--charcoal); }

/* PROJECT HEADER */
.project-header {
  padding: 36px var(--side) 56px;
  max-width: 1440px; margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: end;
  border-bottom: 1px solid var(--light-gray);
}
@media (max-width: 800px) { .project-header { grid-template-columns: 1fr; gap: 32px; } :root { --side: 28px; } }

.project-cat { font-size: 13px; font-weight: 400; color: var(--accent-dark); margin-bottom: 12px; }
.project-title { font-size: clamp(31px, 4vw, 55px); font-weight: 300; line-height: 1.1; color: var(--charcoal); letter-spacing: -0.01em; }

.project-meta { display: flex; flex-direction: column; gap: 20px; padding-bottom: 4px; }
.meta-group { display: flex; flex-direction: column; gap: 4px; }
.meta-label { font-size: 12px; font-weight: 500; color: var(--mid-gray); }
.meta-value { font-size: 16px; font-weight: 300; color: var(--charcoal); line-height: 1.5; }
.meta-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
.meta-tag { font-size: 12px; font-weight: 400; padding: 3px 9px; background: var(--skill-bg); color: var(--mid-gray); border: 1px solid var(--light-gray); border-radius: 2px; }

/* IMAGE GRID */
.project-images {
  padding: 60px var(--side) 120px;
  max-width: 1440px; margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 160px;
  align-items: start;
}
@media (max-width: 600px) { .project-images { grid-template-columns: 1fr; } }

.proj-img {
  width: 100%;
  background: linear-gradient(145deg, #EDEAE4 0%, #D8D4CE 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 400;
  color: var(--mid-gray);
}
.proj-img.span2 { grid-column: 1/-1; }
.proj-img.r169  { aspect-ratio: 16/9; }
.proj-img.r43   { aspect-ratio: 4/3; }
.proj-img.r34   { aspect-ratio: 3/4; }
.proj-img.r23   { aspect-ratio: 2/3; }
.proj-img.r11   { aspect-ratio: 1/1; }

/* FOOTER */
footer { padding: 36px var(--side); text-align: center; }
.fc { font-size: 13px; font-weight: 300; color: var(--light-gray); }
</style>

function getParams() {
  // Works when served (search) and when opened as local file via hash fallback
  var search = window.location.search;
  if (!search && window.location.hash && window.location.hash.indexOf('?') !== -1) {
    search = window.location.hash.substring(window.location.hash.indexOf('?'));
  }
  return new URLSearchParams(search);
}

(function() {
  var params = getParams();
  var id     = params.get('id');
  var filter = params.get('filter') || 'all';
  var p      = projects[id];

  // Back link — returns to portfolio with the right filter active
  var backUrl = 'gabrielle-sirkin-portfolio.html' + (filter !== 'all' ? '#?filter=' + filter : '');
  document.getElementById('backLink').href = backUrl;

  if (!p) { document.getElementById('pTitle').textContent = 'Project not found'; return; }

  document.title = p.title + ' — Gabrielle J. Sirkin';
  document.getElementById('pCat').textContent = p.cat;
  document.getElementById('pTitle').textContent = p.client + ' — ' + p.title;

  // Credits — category-specific field order
  var meta = '';
  var cat = p.cat;

  if (cat === 'Brand Work' || cat === 'Editorial') {
    // Client, Photographer, Year, Areas of Expertise
    if (p.client) meta += '<div class="meta-group"><p class="meta-label">Client</p><p class="meta-value">' + p.client + '</p></div>';
    if (p.photographer) meta += '<div class="meta-group"><p class="meta-label">Photographer</p><p class="meta-value">' + p.photographer + '</p></div>';
    if (p.date) meta += '<div class="meta-group"><p class="meta-label">Year</p><p class="meta-value">' + p.date + '</p></div>';

  } else if (cat === 'Personal' || cat === 'Curation') {
    // Description, Photographer, Year, Areas of Expertise
    if (p.description) meta += '<div class="meta-group"><p class="meta-label">Description</p><p class="meta-value">' + p.description + '</p></div>';
    if (p.photographer) meta += '<div class="meta-group"><p class="meta-label">Photographer</p><p class="meta-value">' + p.photographer + '</p></div>';
    if (p.date) meta += '<div class="meta-group"><p class="meta-label">Year</p><p class="meta-value">' + p.date + '</p></div>';

  } else if (cat === 'Content Creation') {
    // Destination, Areas of Expertise
    if (p.destination) meta += '<div class="meta-group"><p class="meta-label">Destination</p><p class="meta-value">' + p.destination + '</p></div>';
  }

  // Areas of Expertise — all categories
  meta += '<div class="meta-group"><p class="meta-label">Areas of Expertise</p><div class="meta-tags">' +
    p.skills.map(function(s){ return '<span class="meta-tag">'+s+'</span>'; }).join('') +
    '</div></div>';

  document.getElementById('pMeta').innerHTML = meta;

  // Images
  var imgHtml = '';
  for (var i = 0; i < p.images.length; i++) {
    var img = p.images[i];
    var cls = 'proj-img ' + img.r + (img.span ? ' span2' : '');
    imgHtml += '<div class="' + cls + '">Image ' + (i+1) + '</div>';
  }
  document.getElementById('pImages').innerHTML = imgHtml;
})();
