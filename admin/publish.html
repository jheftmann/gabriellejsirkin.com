<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publish — gabriellejsirkin.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-size: 15px;
    background: #f5f3ef;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #fff;
    border-radius: 4px;
    padding: 48px 56px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }

  h1 {
    font-family: 'EB Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    margin-bottom: 6px;
  }

  .subtitle {
    color: #888;
    font-size: 13px;
    margin-bottom: 40px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }

  input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
    background: #fafafa;
    outline: none;
    transition: border-color .15s;
    margin-bottom: 6px;
  }

  input[type="password"]:focus { border-color: #aaa; background: #fff; }

  .token-hint {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 32px;
  }

  .token-hint a { color: #888; }

  .btn-publish {
    width: 100%;
    padding: 14px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: .02em;
    cursor: pointer;
    transition: background .15s;
  }

  .btn-publish:hover:not(:disabled) { background: #333; }
  .btn-publish:disabled { background: #ccc; cursor: default; }

  .status {
    margin-top: 20px;
    padding: 12px 16px;
    border-radius: 3px;
    font-size: 13px;
    display: none;
  }

  .status.success { background: #edf7ed; color: #2e7d32; display: block; }
  .status.error   { background: #fdecea; color: #b71c1c; display: block; }
  .status.info    { background: #f0f4ff; color: #1a3a6b; display: block; }

  .token-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .token-row input { margin-bottom: 0; flex: 1; }

  .btn-clear {
    background: none;
    border: 1px solid #ddd;
    border-radius: 3px;
    padding: 10px 12px;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }

  .btn-clear:hover { border-color: #aaa; color: #666; }

  .divider {
    border: none;
    border-top: 1px solid #eee;
    margin: 32px 0;
  }

  .links {
    display: flex;
    gap: 20px;
    font-size: 13px;
  }

  .links a { color: #888; text-decoration: none; }
  .links a:hover { color: #333; }
</style>
</head>
<body>

<div class="card">
  <h1>Publish to Live</h1>
  <p class="subtitle">gabriellejsirkin.com</p>

  <label for="token">GitHub Access Token</label>
  <div class="token-row">
    <input type="password" id="token" placeholder="ghp_…" autocomplete="off">
    <button class="btn-clear" id="clearToken">Clear</button>
  </div>
  <p class="token-hint">
    Saved in this browser. Need a token?
    <a href="https://github.com/settings/personal-access-tokens/new" target="_blank">Create one</a>
    with <em>Contents: Read and write</em> on this repo.
  </p>

  <button class="btn-publish" id="publishBtn">Publish to Live Site</button>

  <div class="status" id="status"></div>

  <hr class="divider">

  <div class="links">
    <a href="index.html">CMS</a>
    <a href="upload.html">Upload Images</a>
    <a href="https://gabriellejsirkin.netlify.app" target="_blank">Live site</a>
    <a href="https://github.com/jheftmann/gabriellejsirkin.com/actions" target="_blank">Build status</a>
  </div>
</div>

<script>
  const REPO  = 'jheftmann/gabriellejsirkin.com';
  const TOKEN_KEY = 'gjs_gh_token';

  const tokenInput  = document.getElementById('token');
  const clearBtn    = document.getElementById('clearToken');
  const publishBtn  = document.getElementById('publishBtn');
  const statusEl    = document.getElementById('status');

  // Restore saved token
  const saved = localStorage.getItem(TOKEN_KEY);
  if (saved) tokenInput.value = saved;

  clearBtn.addEventListener('click', () => {
    tokenInput.value = '';
    localStorage.removeItem(TOKEN_KEY);
  });

  publishBtn.addEventListener('click', async () => {
    const token = tokenInput.value.trim();
    if (!token) { showStatus('error', 'Please enter a GitHub access token.'); return; }

    // Save token for next time
    localStorage.setItem(TOKEN_KEY, token);

    publishBtn.disabled = true;
    showStatus('info', 'Publishing…');

    try {
      const res = await fetch(`https://api.github.com/repos/${REPO}/merges`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          base: 'main',
          head: 'draft',
          commit_message: 'Publish: merge draft into main',
        }),
      });

      if (res.status === 201) {
        showStatus('info', 'Published! Syncing draft back to main…');
        await resetDraftToMain(token);
        showStatus('success', 'Published. The site will update in about 30 seconds.');
      } else if (res.status === 204) {
        showStatus('success', 'Already up to date — no new changes to publish.');
      } else if (res.status === 401) {
        showStatus('error', 'Invalid token. Please check and try again.');
      } else if (res.status === 409) {
        showStatus('error', 'Merge conflict between draft and main. Contact your developer.');
      } else {
        const body = await res.json().catch(() => ({}));
        showStatus('error', `Error ${res.status}: ${body.message || 'Unknown error.'}`);
      }
    } catch (err) {
      showStatus('error', 'Network error. Check your connection and try again.');
    }

    publishBtn.disabled = false;
  });

  async function resetDraftToMain(token) {
    // Merge main → draft so the next publish is always a clean fast-forward
    await fetch(`https://api.github.com/repos/${REPO}/merges`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        base: 'draft',
        head: 'main',
        commit_message: 'sync: align draft with main after publish [skip ci]',
      }),
    });
    // 201 = merged, 204 = already aligned — both are fine
  }

  function showStatus(type, msg) {
    statusEl.className = `status ${type}`;
    statusEl.textContent = msg;
  }
</script>

</body>
</html>
