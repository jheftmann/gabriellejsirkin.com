<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Manager</title>
  <style>
    .cms-pill-btn {
      position: fixed;
      right: 12px;
      z-index: 9999;
      font-family: system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 6px;
      text-decoration: none;
      transition: opacity .15s;
      letter-spacing: .01em;
      opacity: 0.85;
    }
    .cms-pill-btn:hover { opacity: 1; }
    #publish-btn {
      bottom: 52px;
      background: #1a1a1a;
      color: #fff;
    }
    #upload-btn {
      bottom: 12px;
      background: #fff;
      color: #1a1a1a;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <a id="upload-btn" class="cms-pill-btn" href="upload.html" target="_blank" rel="noopener">Upload Images</a>
  <a id="publish-btn" class="cms-pill-btn" href="publish.html" target="_blank" rel="noopener">Publish to Live</a>
  <script>
    // Only show "Publish to Live" on list/home views, not inside a project edit page
    function updatePublishBtn() {
      var isEditView = location.hash.includes('/entries/');
      document.getElementById('publish-btn').style.display = isEditView ? 'none' : '';
    }
    window.addEventListener('hashchange', updatePublishBtn);
    updatePublishBtn();
  </script>
</body>
</html>
