<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Manager</title>
  <style>
    #publish-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      background: #1a1a1a;
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 18px;
      border-radius: 20px;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      transition: background .15s, transform .1s;
      letter-spacing: .01em;
    }
    #publish-btn:hover { background: #333; transform: translateY(-1px); }
    #upload-btn {
      position: fixed;
      bottom: 24px;
      right: 166px;
      z-index: 9999;
      background: #fff;
      color: #1a1a1a;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 18px;
      border-radius: 20px;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
      transition: background .15s, transform .1s;
      letter-spacing: .01em;
      border: 1px solid #e0e0e0;
    }
    #upload-btn:hover { background: #f5f5f5; transform: translateY(-1px); }
  </style>
</head>
<body>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <a id="upload-btn" href="upload.html" target="_blank" rel="noopener">Upload Images</a>
  <a id="publish-btn" href="publish.html" target="_blank" rel="noopener">Publish to Live</a>
</body>
</html>
