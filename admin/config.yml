backend:
  name: github
  repo: jheftmann/gabriellejsirkin.com
  branch: draft
  base_url: https://sveltia-cms-auth.gabriellesirkin.workers.dev

site_url: https://gabriellejsirkin.netlify.app
display_url: https://gabriellejsirkin.netlify.app

# Images upload to the project's own folder
media_folder: assets/images
public_folder: assets/images

collections:

  # ── Projects ──────────────────────────────────────────────────────────────
  - name: projects
    label: Projects
    label_singular: Project
    folder: content/projects
    path: '{{slug}}/index'
    media_folder: ''
    public_folder: ''
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    summary: '{{title}} — {{cat}}'
    sortable_fields: [title, date, cat]
    fields:
      - { name: title, label: Title, widget: string }

      - name: cat
        label: Categories
        widget: list
        required: false
        hint: 'Type category names matching Settings → Global → Categories. Add multiple to show in more than one tab.'
        field: { name: item, label: Category, widget: string }

      - { name: client, label: Client, widget: string, required: false }
      - { name: date,   label: Year,   widget: string, required: false }

      - name: credits_list
        label: Credits
        widget: list
        required: false
        hint: 'Key–value credit pairs shown on the project page (e.g. Photographer / Jane Smith).'
        fields:
          - { name: label, label: Label, widget: string }
          - { name: value, label: Value, widget: string }

      - { name: order,     label: 'Order (within category)', widget: number, required: false,
          hint: 'Controls position within its category tab. Leave blank to sort after numbered projects.' }
      - { name: order_all, label: 'Order (All page)',        widget: number, required: false,
          hint: 'Controls position on the All tab. Leave blank to sort after numbered projects.' }

      - { name: description, label: Description, widget: text, required: false,
          hint: 'Shown in the project header above the meta fields.' }

      - { name: credits, label: Credits, widget: text, required: false,
          hint: 'Full credits line shown after the year, e.g. "Photography: X — Styling: Y"' }

      - name: skills
        label: Areas of Expertise
        widget: list
        required: false
        hint: 'Tags shown on the card and project page, e.g. Visual Direction, Production'


      - { name: coming_soon, label: Coming Soon, widget: boolean, required: false, default: false }

      - name: color_theme
        label: Color Theme
        widget: select
        required: false
        default: default
        options:
          - { label: Default,    value: default    }
          - { label: Colorway 1, value: colorway-1 }
          - { label: Colorway 2, value: colorway-2 }
          - { label: Colorway 3, value: colorway-3 }
          - { label: Colorway 4, value: colorway-4 }
          - { label: Colorway 5, value: colorway-5 }
          - { label: Colorway 6, value: colorway-6 }
          - { label: Colorway 7, value: colorway-7 }
          - { label: About,      value: about      }
          - { label: Services,   value: services   }

      - name: thumbnail
        label: Card Thumbnail
        widget: file
        required: false
        media_folder: ''
        public_folder: ''
        hint: 'Override the card thumbnail. Leave blank to use the first project image. Accepts images or mp4 video.'

      - name: media
        label: Media
        widget: list
        required: false
        hint: 'Images and videos in display order. Add them here to control the sequence — mix stills and video freely.'
        media_folder: ''
        public_folder: ''
        fields:
          - { name: file, label: File, widget: file }
          - { name: caption, label: Caption, widget: string, required: false, hint: 'Optional caption shown below the image.' }
          - { name: bts, label: BTS, widget: boolean, required: false, default: false, hint: 'Mark this image as behind-the-scenes.' }

  # ── Pages ──────────────────────────────────────────────────────────────────
  - name: pages
    label: Pages
    files:
      - name: home
        label: Home
        file: content/pages/home.md
        fields:
          - { name: hero_main,   label: Hero — Line 1, widget: string }
          - { name: hero_accent, label: Hero — Line 2 (optional), widget: string, required: false }
          - { name: og_title,       label: 'SEO — Title override',   widget: string, required: false }
          - { name: og_description, label: 'SEO — Description',      widget: string, required: false }
          - { name: og_image,       label: 'SEO — Share image',      widget: image,  required: false }
          - { name: color_theme,    label: Color Theme,              widget: select, required: false, default: default,
              options: [{ label: Default, value: default }, { label: 'Colorway 1', value: colorway-1 }, { label: 'Colorway 2', value: colorway-2 }, { label: 'Colorway 3', value: colorway-3 }, { label: 'Colorway 4', value: colorway-4 }, { label: 'Colorway 5', value: colorway-5 }, { label: 'Colorway 6', value: colorway-6 }, { label: 'Colorway 7', value: colorway-7 }, { label: About, value: about }, { label: Services, value: services }] }

      - name: about
        label: About
        file: content/pages/about.md
        fields:
          - { name: headline_1, label: Headline — Line 1, widget: string }
          - { name: headline_2, label: Headline — Line 2 (italic), widget: string }
          - { name: lead, label: Lead Paragraph, widget: string }
          - { name: sidebar_photo, label: Sidebar Photo, widget: image,
              hint: 'Portrait photo shown in the sidebar (approx 196×261px).',
              required: false }

          - { name: skill1_name, label: 'Skill 1 — Name', widget: string }
          - { name: skill1_desc, label: 'Skill 1 — Description', widget: text }
          - { name: skill2_name, label: 'Skill 2 — Name', widget: string }
          - { name: skill2_desc, label: 'Skill 2 — Description', widget: text }
          - { name: skill3_name, label: 'Skill 3 — Name', widget: string }
          - { name: skill3_desc, label: 'Skill 3 — Description', widget: text }
          - { name: skill4_name, label: 'Skill 4 — Name', widget: string }
          - { name: skill4_desc, label: 'Skill 4 — Description', widget: text }

          - { name: services_text, label: Services, widget: string }

          - { name: bio, label: Bio, widget: text,
              hint: 'Separate paragraphs with a blank line.' }
          - { name: og_title,       label: 'SEO — Title override',   widget: string, required: false }
          - { name: og_description, label: 'SEO — Description',      widget: string, required: false }
          - { name: og_image,       label: 'SEO — Share image',      widget: image,  required: false }
          - { name: color_theme,    label: Color Theme,              widget: select, required: false, default: about,
              options: [{ label: Default, value: default }, { label: 'Colorway 1', value: colorway-1 }, { label: 'Colorway 2', value: colorway-2 }, { label: 'Colorway 3', value: colorway-3 }, { label: 'Colorway 4', value: colorway-4 }, { label: 'Colorway 5', value: colorway-5 }, { label: 'Colorway 6', value: colorway-6 }, { label: 'Colorway 7', value: colorway-7 }, { label: About, value: about }, { label: Services, value: services }] }

      - name: travel
        label: Services
        file: content/pages/travel.md
        fields:
          - { name: headline_1, label: Headline — Line 1, widget: string }
          - { name: headline_2, label: Headline — Line 2 (italic), widget: string }

          - { name: sidebar_label, label: Sidebar Heading, widget: string,
              hint: 'e.g. "Start a project"', default: 'Start a project' }
          - { name: availability, label: Availability Note, widget: string,
              hint: 'Short note about current project availability for the sidebar.' }
          - { name: sidebar_photo, label: Sidebar Photo, widget: image,
              hint: 'Landscape photo shown in the sidebar (approx 196×131px).',
              required: false }

          - { name: approach, label: Approach, widget: text,
              hint: 'Separate paragraphs with a blank line.' }

          - name: services
            label: Services
            widget: list
            field: { name: item, label: Service, widget: string }

          - name: clients
            label: Who We Work With
            widget: list
            field: { name: item, label: Client Type, widget: string }

          - { name: city_guides_intro, label: City Guides — Intro, widget: string }

          - name: cities
            label: City Guides — Cities
            widget: list
            field: { name: item, label: City, widget: string }
          - { name: og_title,       label: 'SEO — Title override',   widget: string, required: false }
          - { name: og_description, label: 'SEO — Description',      widget: string, required: false }
          - { name: og_image,       label: 'SEO — Share image',      widget: image,  required: false }
          - { name: color_theme,    label: Color Theme,              widget: select, required: false, default: services,
              options: [{ label: Default, value: default }, { label: 'Colorway 1', value: colorway-1 }, { label: 'Colorway 2', value: colorway-2 }, { label: 'Colorway 3', value: colorway-3 }, { label: 'Colorway 4', value: colorway-4 }, { label: 'Colorway 5', value: colorway-5 }, { label: 'Colorway 6', value: colorway-6 }, { label: 'Colorway 7', value: colorway-7 }, { label: About, value: about }, { label: Services, value: services }] }

  # ── Site settings ──────────────────────────────────────────────────────────
  - name: settings
    label: Settings
    files:
      - name: global
        label: Global
        file: content/settings.md
        fields:
          - { name: site_title,       label: Site Title,       widget: string }
          - { name: site_description, label: Site Description, widget: string }
          - { name: site_url,         label: Site URL,         widget: string }
          - { name: contact_email,    label: Contact Email,    widget: string }
          - { name: contact_instagram, label: Instagram URL,   widget: string }
          - { name: contact_linkedin,  label: LinkedIn URL,    widget: string }
          - name: nav
            label: Navigation
            widget: list
            hint: 'Format each item as "Label|page.html", e.g. "Work|index.html"'
            field: { name: item, label: Nav Item, widget: string }
          - { name: og_title_base, label: 'Base Page Title', widget: string,
              hint: 'Used as the root for all page titles, e.g. "Gabrielle J. Sirkin, Creative Studio for Travel"' }
          - { name: sharecard_url, label: 'Default OG Image URL', widget: string,
              hint: 'Fallback social share image (absolute URL) when no page-specific image is set.' }
          - { name: ga_tracking_id, label: 'Google Analytics Tracking ID', widget: string, required: false,
              hint: 'Your GA4 Measurement ID, e.g. G-XXXXXXXXXX. Leave blank to disable analytics.' }
          - name: categories
            label: Project Categories
            widget: list
            hint: 'Defines the available project categories and filter tabs. Order here controls order in the filter bar.'
            field: { name: category, label: Category, widget: string }
